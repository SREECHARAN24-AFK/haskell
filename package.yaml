name:                chefs-kitchen
version:             1.0.0
synopsis:            Professional Cooking Trainer - Haskell Mini Project
description:         A Haskell web application that teaches cooking with 30 detailed recipes and an interactive quiz system

dependencies:
  - base >= 4.7 && < 5
  - aeson
  - scotty
  - text

executables:
  chefs-kitchen:
    main:                Main.hs
    source-dirs:         backend
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
